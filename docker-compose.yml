services:
  spotalert:
    build: .
    container_name: spotalert
    restart: unless-stopped
    ports:
      - "7478:8088"
    volumes:
      - /Volume2/public/docker/spotalert/data:/app/data
      - /Volume2/public/docker/spotalert/lightroom:/app/lightroom
      - /Volume2/public/docker/spotalert/logs:/app/logs
      - /Volume2/public/docker/spotalert/translations:/app/static/translations
      # Airline-logo/airforce-roundel disk cache — without this, every image
      # rebuild wipes it, and the next page load re-triggers a burst of
      # blocking third-party network calls (logostream/GitHub/jsdelivr) for
      # every distinct airline/military-country shown, one per cache miss.
      - /Volume2/public/docker/spotalert/airline_logos:/app/static/airline_logos
      # RAW spotting photos, read-only — backs the Controller-only session-photo
      # preview feature. Mounted straight off the NAS's own local filesystem
      # (the container already runs on this NAS) rather than the \\192.168.4.100
      # SMB path Lightroom itself records in the catalog — no point routing
      # through the network stack for a share that's already local. :ro means
      # the app can read files but has no write/delete access to the originals
      # at all, at the mount level (not just app-level access control).
      - "/Volume2/Photo/Plane Spotting:/app/photos:ro"
      # Generated thumbnail cache (extracted RAW previews, downscaled) — kept
      # out of the read-only photos mount and persisted across rebuilds so
      # thumbnails aren't re-extracted (a real cost — reading a 25MB+ RAW file
      # per photo) on every container restart.
      - /Volume2/public/docker/spotalert/session_thumbs:/app/static/session_thumbs
    environment:
      - TZ=Australia/Sydney
